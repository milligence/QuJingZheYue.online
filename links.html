<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>曲径折跃 · 目录</title>

  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #050505;
      color: #f5f5f5;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      box-sizing: border-box;
    }

    .page {
      width: min(820px, 100%);
    }

    .eyebrow {
      color: rgba(255,255,255,0.48);
      letter-spacing: 0.22em;
      font-size: 13px;
      margin-bottom: 18px;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(36px, 6vw, 76px);
      font-weight: 650;
      letter-spacing: 0.06em;
    }

    .desc {
      margin: 0 0 42px;
      color: rgba(255,255,255,0.68);
      font-size: 16px;
      line-height: 1.8;
    }

    .list {
      display: grid;
      gap: 18px;
    }

    .card {
      display: block;
      padding: 24px 26px;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 20px;
      color: white;
      text-decoration: none;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.025));
      transition:
        transform 0.25s ease,
        border-color 0.25s ease,
        background 0.25s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: rgba(255,255,255,0.48);
      background:
        linear-gradient(135deg, rgba(255,255,255,0.13), rgba(255,255,255,0.04));
    }

    .card-title {
      font-size: 23px;
      margin-bottom: 8px;
      letter-spacing: 0.04em;
    }

    .card-meta {
      color: rgba(255,255,255,0.58);
      font-size: 14px;
      line-height: 1.7;
    }

    .sub-links {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .pill {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.22);
      color: rgba(255,255,255,0.9);
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 0.04em;
      background: rgba(255,255,255,0.035);
      transition:
        border-color 0.2s ease,
        background 0.2s ease,
        transform 0.2s ease;
    }

    .pill:hover {
      border-color: rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.09);
      transform: translateY(-1px);
    }

    .back {
      display: inline-block;
      margin-top: 36px;
      color: rgba(255,255,255,0.56);
      text-decoration: none;
      font-size: 14px;
    }

    .back:hover {
      color: white;
    }

    .note {
      margin-top: 24px;
      color: rgba(255,255,255,0.38);
      font-size: 13px;
      line-height: 1.7;
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="eyebrow">Qu Jing Zhe Yue</div>

    <h1>半成品</h1>

    <p class="desc">
      Between the hand and the lip, there is many a slip.
      直到动手去做，我才意识到自己的笨拙。
    </p>

    <section class="list">
      <div class="card">
        <div class="card-title">《xx日谈》：《逻辑哲学论》批评</div>

        <div class="sub-links">
          <a class="pill" href="./essay.pdf" target="_blank" rel="noopener noreferrer">
            打开 PDF
          </a>

          <a class="pill" href="./essay.pdf" download>
            下载 PDF
          </a>

        </div>
      </div>

      <div class="card">
        <div class="card-title"> AI（制作的）动画《概率之间》</div>
        <div class="card-meta">太大了不让上传！</div>

        <div class="sub-links">
          <a class="pill" href="https://www.bilibili.com/video/BV1CqRJBcEKC/?share_source=copy_web" target="_blank" rel="noopener noreferrer">
            就在线观看咯╮(╯▽╰)╭
          </a>
        </div>
      </div>
    </section>

    <a class="back" href="./index.html">← 再晕一遍</a>

    <p class="footer-note">顺便一提，那个建筑是盒子空间（交通大学店），便宜还近。</p>
  </main>
</body>
</html>
