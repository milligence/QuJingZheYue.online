<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>曲径折跃</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: black;
      overflow: hidden;
    }

    video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: black;
    }

    .dark-mask {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.25) 55%, rgba(0,0,0,0.75) 100%);
      pointer-events: none;
      z-index: 2;
    }

    .final-content {
      position: absolute;
      left: 50%;
      bottom: 16%;
      transform: translate(-50%, 24px);
      z-index: 3;
      text-align: center;
      color: white;
      opacity: 0;
      pointer-events: none;
      transition:
        opacity 1.4s ease,
        transform 1.4s ease;
    }

    .final-content.show {
      opacity: 1;
      transform: translate(-50%, 0);
      pointer-events: auto;
    }

    .line-1 {
      font-size: clamp(28px, 5vw, 72px);
      font-weight: 600;
      letter-spacing: 0.16em;
      text-shadow: 0 0 24px rgba(255,255,255,0.55);
      margin-bottom: 24px;
      white-space: nowrap;
    }

    .line-2 {
      font-size: clamp(14px, 2vw, 22px);
      letter-spacing: 0.08em;
      opacity: 0.86;
      margin-bottom: 32px;
    }

    .link-button {
      display: inline-block;
      padding: 12px 22px;
      border: 1px solid rgba(255,255,255,0.65);
      border-radius: 999px;
      color: white;
      text-decoration: none;
      font-size: 15px;
      letter-spacing: 0.08em;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(8px);
      transition:
        background 0.25s ease,
        transform 0.25s ease,
        border-color 0.25s ease;
    }

    .link-button:hover {
      background: rgba(255,255,255,0.16);
      border-color: white;
      transform: translateY(-2px);
    }

    .scanline {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.035) 0px,
        rgba(255,255,255,0.035) 1px,
        transparent 1px,
        transparent 4px
      );
      mix-blend-mode: screen;
      opacity: 0.22;
    }
  </style>
</head>

<body>
  <main class="stage">
    <video id="bgVideo" autoplay muted playsinline preload="auto">
      <source src="./zoom.mp4" type="video/mp4" />
    </video>

    <div class="dark-mask"></div>
    <div class="scanline"></div>

    <section id="finalContent" class="final-content">
      <div class="line-1">目标已锁定</div>
      <div class="line-2">曲径折跃完成。</div>
      <a class="link-button" href="https://example.com" target="_blank" rel="noopener noreferrer">
        进入链接
      </a>
    </section>
  </main>

  <script>
    const video = document.getElementById("bgVideo");
    const finalContent = document.getElementById("finalContent");

    function showFinalContent() {
      finalContent.classList.add("show");

      // 确保视频停在最后一帧，而不是黑屏或重新播放
      video.pause();
      video.currentTime = video.duration;
    }

    video.addEventListener("ended", showFinalContent);

    // 兜底：有些浏览器 ended 触发不稳定，就在接近结尾时显示
    video.addEventListener("timeupdate", () => {
      if (video.duration && video.duration - video.currentTime < 0.25) {
        showFinalContent();
      }
    });
  </script>
</body>
</html>
